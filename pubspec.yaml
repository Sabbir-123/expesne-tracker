name: speakspend
description: A voice-first AI expense tracker.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Routing
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.1
  
  # Firebase Core & Backend
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_analytics: ^11.0.0
  
  # Networking & ENV & UUID
  http: ^1.1.2
  flutter_dotenv: ^5.2.1
  uuid: ^4.3.3
  
  # UI & Utilities
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0-hotfix.1
  fl_chart: ^0.65.0
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  
  # Voice Recording (Audio bytes/file for Whisper)
  record: ^6.2.0
  path_provider: ^2.1.2
  speech_to_text: ^6.6.2
  
  # Freezed & JSON
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
